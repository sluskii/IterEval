services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: goveval
      POSTGRES_USER: goveval
      POSTGRES_PASSWORD: goveval
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goveval -d goveval"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      GOVEVAL_PG_DSN: postgresql://goveval:goveval@db:5432/goveval
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
